spring.application.name=100daysOfSpringBoot

# Ενεργοποίηση H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Ρυθμίσεις σύνδεσης
spring.datasource.url=jdbc:h2:mem:daysOfSpringBoot
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=database
spring.datasource.password=1234
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Hibernate settings
spring.jpa.hibernate.ddl-auto=update

# Να τρέξει το data.sql ΑΦΟΥ το Hibernate φτιάξει τους πίνακες
spring.jpa.defer-datasource-initialization=true

# expose everything (fine for local learning) (for spring actuator)
management.endpoints.web.exposure.include=*